<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <script>
    window.addEventListener("error", function (e) {
      var show = function () {
        var d = document.createElement("div");
        d.style.cssText =
          "position:fixed;left:8px;right:8px;bottom:8px;background:#fdecec;color:#a11;font:11px monospace;padding:8px;border-radius:8px;z-index:9999;white-space:pre-wrap;";
        d.textContent = "Ошибка: " + e.message + "\n" + (e.filename || "") + ":" + (e.lineno || "");
        document.body.appendChild(d);
      };
      document.body ? show() : window.addEventListener("DOMContentLoaded", show);
    });
  </script>
  <link rel="stylesheet" href="common.css" />
  <style>
    body { display: flex; height: 100vh; overflow: hidden; }

    nav {
      width: 190px;
      background: var(--card);
      border-right: 1px solid var(--border);
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    nav .app-name { font-weight: 700; padding: 2px 10px 16px; font-size: 15px; letter-spacing: -0.01em; }
    nav .app-name .dot { color: var(--accent); }
    nav button {
      text-align: left;
      padding: 10px 12px;
      border-radius: var(--radius);
      color: var(--muted);
      font-size: 14px;
      font-weight: 500;
      transition: background .14s, color .14s, box-shadow .14s;
    }
    nav button:hover { background: var(--card-hover); color: var(--text); }
    nav button.active { background: var(--accent); color: #fff; box-shadow: var(--shadow); }
    nav .spacer { flex: 1; }
    nav .ver { padding: 0 10px; font-size: 11px; color: var(--muted); }

    main { flex: 1; overflow-y: auto; padding: 24px 28px; position: relative; }
    section { display: none; max-width: 560px; }
    section.active { display: block; }

    /* Чат занимает всю область main без отступов */
    #sec-chat { position: absolute; inset: 0; max-width: none; padding: 0; }
    #sec-chat.active { display: flex; }
    .chat-wrap { display: flex; width: 100%; height: 100%; }
    .chat-list {
      width: 200px;
      flex: none;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      background: var(--card);
    }
    .chat-list .new {
      margin: 10px;
      padding: 9px;
      border-radius: 8px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      text-align: center;
    }
    .chat-list .new:hover { background: var(--accent-hover); }
    .chat-list .convs { flex: 1; overflow-y: auto; padding: 0 6px 8px; }
    .conv {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
    }
    .conv:hover { background: var(--card-hover); }
    .conv.active { background: var(--chip); }
    .conv .ct { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .conv .del { color: var(--muted); opacity: 0; font-size: 15px; padding: 0 4px; }
    .conv:hover .del { opacity: 1; }
    .conv .del:hover { color: var(--err); }
    .chat-empty-list { padding: 16px 10px; color: var(--muted); font-size: 12px; text-align: center; }

    .chat-main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
    .chat-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .chat-header select { max-width: 260px; }
    .chat-header .eng { font-size: 12px; color: var(--muted); margin-left: auto; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 18px 16px; display: flex; flex-direction: column; gap: 12px; }
    .chat-hello { margin: auto; max-width: 340px; text-align: center; color: var(--muted); line-height: 1.5; }

    .bubble { max-width: 82%; padding: 10px 13px; border-radius: 14px; line-height: 1.45; white-space: pre-wrap; word-wrap: break-word; }
    .bubble.user { align-self: flex-end; background: var(--accent); color: #fff; border-bottom-right-radius: 5px; }
    .bubble.bot { align-self: flex-start; background: var(--card); border: 1px solid var(--border); border-bottom-left-radius: 5px; }
    .bubble.bot .think {
      margin-bottom: 8px;
      border-left: 2px solid var(--border);
      padding-left: 8px;
    }
    .bubble.bot .think summary { cursor: pointer; color: var(--muted); font-size: 12px; user-select: none; }
    .bubble.bot .think .think-body { color: var(--muted); font-size: 12.5px; margin-top: 6px; white-space: pre-wrap; }
    .bubble .cursor::after { content: "▋"; animation: blink 1s steps(2) infinite; color: var(--muted); }
    @keyframes blink { 50% { opacity: 0; } }
    .bubble code {
      background: var(--chip);
      padding: 1px 5px;
      border-radius: 5px;
      font-family: Consolas, monospace;
      font-size: 12.5px;
    }
    .bubble pre {
      background: var(--chip);
      padding: 8px 10px;
      border-radius: 8px;
      overflow-x: auto;
      font-family: Consolas, monospace;
      font-size: 12.5px;
      margin: 6px 0;
      white-space: pre;
    }

    .chat-input-row { display: flex; gap: 8px; padding: 12px 16px; border-top: 1px solid var(--border); align-items: flex-end; }
    .chat-input-row textarea { resize: none; max-height: 140px; min-height: 42px; }
    .chat-input-row button { flex: none; height: 42px; }
    h2 { font-size: 17px; margin-bottom: 18px; letter-spacing: -0.01em; font-weight: 650; }
    .row { margin-bottom: 18px; }
    .row label.head { display: block; font-weight: 600; margin-bottom: 6px; }
    .row .sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .inline { display: flex; gap: 10px; align-items: center; }
    .inline input[type="text"] { max-width: 240px; }
    .inline select { max-width: 240px; }

    .check { display: flex; gap: 10px; align-items: center; cursor: pointer; }
    .check input { width: 17px; height: 17px; accent-color: var(--accent); }

    .note {
      background: var(--card);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: var(--radius);
      padding: 12px 14px;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 20px;
      box-shadow: var(--shadow);
    }
    .note.ok { border-left-color: var(--ok); }

    ol.howto { margin: 6px 0 0 18px; line-height: 1.9; font-size: 13.5px; }

    .style-item, .model-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 13px 15px;
      margin-bottom: 11px;
      box-shadow: var(--shadow);
      transition: box-shadow .16s, border-color .16s;
    }
    .model-card:hover { box-shadow: var(--shadow-md); }
    .style-item .head-row { display: flex; align-items: center; gap: 8px; }
    .style-item .name { font-weight: 600; }
    .style-item .prompt { font-size: 12.5px; color: var(--muted); margin-top: 4px; line-height: 1.45; }
    .style-item .head-row button { margin-left: auto; font-size: 12px; }

    .model-card .head-row { display: flex; align-items: center; gap: 10px; }
    .model-card .name { font-weight: 600; }
    .badge {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      background: var(--chip);
      color: var(--chip-text);
      letter-spacing: 0.01em;
    }
    .badge.active { background: var(--ok); color: #fff; }
    .model-card .desc { font-size: 12.5px; color: var(--muted); margin: 6px 0 10px; line-height: 1.5; }
    .model-card .actions { display: flex; gap: 8px; align-items: center; }
    .progress {
      height: 8px;
      background: var(--chip);
      border-radius: 99px;
      overflow: hidden;
      flex: 1;
      display: none;
    }
    .progress > div { height: 100%; width: 0%; background: var(--accent); transition: width .2s; }
    .engine { font-size: 13px; margin-bottom: 16px; }

    .hotkey-input.rec { border-color: var(--accent); color: var(--muted); }
    .err-text { color: var(--err); font-size: 12.5px; margin-top: 6px; display: none; }

    /* ---- Вкладка генерации изображений ---- */
    #sec-image { position: absolute; inset: 0; max-width: none; padding: 0; }
    #sec-image.active { display: flex; }
    .img-wrap { display: flex; width: 100%; height: 100%; }
    .img-side {
      width: 340px;
      flex: none;
      border-right: 1px solid var(--border);
      background: var(--card);
      overflow-y: auto;
      padding: 16px;
    }
    .img-eng { font-size: 12.5px; color: var(--muted); margin-bottom: 12px; }
    .img-side textarea, .img-side select, .img-side input[type="number"] { width: 100%; }
    .img-form.disabled { opacity: 0.5; pointer-events: none; }
    .img-adv { margin-bottom: 6px; }
    .img-adv summary { cursor: pointer; color: var(--muted); font-size: 13px; user-select: none; }
    .img-adv .row { margin-bottom: 12px; }
    .img-main { flex: 1; overflow-y: auto; padding: 16px; }
    .img-gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
    }
    .img-empty { grid-column: 1 / -1; text-align: center; color: var(--muted); margin-top: 60px; line-height: 1.6; }
    .img-cell {
      position: relative;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      background: var(--chip);
      aspect-ratio: 1 / 1;
      box-shadow: var(--shadow);
      transition: transform .15s, box-shadow .15s;
    }
    .img-cell:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .img-cell img { width: 100%; height: 100%; object-fit: cover; cursor: zoom-in; display: block; }
    .img-cell.pending { display: flex; align-items: center; justify-content: center; color: var(--muted); font-size: 12px; }
    .img-cell .tools {
      position: absolute; left: 0; right: 0; bottom: 0;
      display: flex; gap: 4px; padding: 6px;
      background: linear-gradient(transparent, rgba(0,0,0,0.55));
      opacity: 0; transition: opacity .15s;
    }
    .img-cell:hover .tools { opacity: 1; }
    .img-cell .tools button {
      flex: 1; font-size: 11px; padding: 4px 0; border-radius: 6px;
      background: rgba(255,255,255,0.92); color: #111;
    }
    .img-lightbox {
      position: fixed; inset: 0; background: rgba(0,0,0,0.85);
      display: none; align-items: center; justify-content: center; z-index: 1000; padding: 24px;
    }
    .img-lightbox.on { display: flex; }
    .img-lightbox img { max-width: 100%; max-height: 100%; border-radius: 8px; }
    .spin {
      width: 22px; height: 22px; border: 3px solid var(--border);
      border-top-color: var(--accent); border-radius: 50%;
      animation: spin 0.8s linear infinite; margin-bottom: 8px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <nav>
    <div class="app-name"><span class="dot">●</span> Ответка</div>
    <button id="nav-chat"></button>
    <button id="nav-image"></button>
    <button id="nav-general" class="active"></button>
    <button id="nav-styles"></button>
    <button id="nav-model"></button>
    <div class="spacer"></div>
    <div class="ver" id="version"></div>
  </nav>
  <main>
    <section id="sec-chat">
      <div class="chat-wrap">
        <div class="chat-list">
          <button class="new" id="chat-new"></button>
          <div class="convs" id="chat-convs"></div>
        </div>
        <div class="chat-main">
          <div class="chat-header">
            <span id="chat-model-label"></span>
            <select id="chat-model"></select>
            <span class="eng" id="chat-eng"></span>
          </div>
          <div class="chat-messages" id="chat-messages"></div>
          <div class="chat-input-row">
            <textarea id="chat-input" rows="1"></textarea>
            <button class="btn primary" id="chat-send"></button>
          </div>
        </div>
      </div>
    </section>

    <section id="sec-image">
      <div class="img-wrap">
        <div class="img-side">
          <div class="img-eng" id="img-eng"></div>
          <div class="note" id="img-nomodel" style="display:none"></div>
          <div class="img-form" id="img-form">
            <div class="row">
              <label class="head" id="l-img-prompt"></label>
              <textarea id="img-prompt" rows="3"></textarea>
              <div class="sub" id="l-img-prompt-hint"></div>
            </div>
            <div class="row">
              <label class="check" style="gap:8px">
                <input type="checkbox" id="img-enhance" />
                <span id="l-img-enhance"></span>
              </label>
              <div class="sub" id="l-img-enhance-hint"></div>
            </div>
            <div class="row">
              <label class="head" id="l-img-ref"></label>
              <input type="file" id="img-ref-file" accept="image/png,image/jpeg,image/webp" style="display:none" />
              <div class="inline">
                <button class="btn" id="img-ref-btn" style="font-size:12.5px"></button>
                <div id="img-ref-preview" style="display:none;position:relative">
                  <img id="img-ref-thumb" style="width:56px;height:56px;object-fit:cover;border-radius:8px;border:1px solid var(--border);display:block" />
                  <button id="img-ref-remove" title="✕" style="position:absolute;top:-7px;right:-7px;width:18px;height:18px;line-height:16px;padding:0;border-radius:50%;background:var(--err);color:#fff;font-size:11px">✕</button>
                </div>
              </div>
              <div class="sub" id="l-img-ref-hint"></div>
              <div id="img-strength-row" style="display:none;margin-top:10px">
                <label class="head"><span id="l-img-strength"></span>: <span id="img-strength-val"></span></label>
                <input type="range" id="img-strength" min="0.2" max="0.9" step="0.05" style="width:100%" />
                <div class="sub" id="l-img-strength-hint"></div>
              </div>
            </div>
            <div class="row">
              <label class="head" id="l-img-size"></label>
              <select id="img-size">
                <option value="1024x1024"></option>
                <option value="832x1216"></option>
                <option value="1216x832"></option>
                <option value="1920x1088"></option>
                <option value="1088x1920"></option>
              </select>
              <div class="sub" id="l-img-size-hint"></div>
            </div>
            <div class="row">
              <label class="head" id="l-img-count"></label>
              <select id="img-count">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
              </select>
            </div>
            <details class="img-adv">
              <summary id="l-img-adv"></summary>
              <div class="row" style="margin-top:12px">
                <label class="head" id="l-img-neg"></label>
                <textarea id="img-neg" rows="2"></textarea>
                <div class="sub" id="l-img-neg-hint"></div>
              </div>
              <div class="row">
                <label class="head"><span id="l-img-steps"></span>: <span id="img-steps-val"></span></label>
                <input type="range" id="img-steps" min="8" max="50" step="1" style="width:100%" />
                <div class="sub" id="l-img-steps-hint"></div>
              </div>
              <div class="row">
                <label class="head"><span id="l-img-cfg"></span>: <span id="img-cfg-val"></span></label>
                <input type="range" id="img-cfg" min="1" max="12" step="0.5" style="width:100%" />
                <div class="sub" id="l-img-cfg-hint"></div>
              </div>
              <div class="row">
                <label class="head" id="l-img-seed"></label>
                <div class="inline">
                  <input type="number" id="img-seed" style="max-width:150px" />
                  <label class="check" style="gap:6px">
                    <input type="checkbox" id="img-seed-rand" checked />
                    <span id="l-img-seed-rand"></span>
                  </label>
                </div>
                <div class="sub" id="l-img-seed-hint"></div>
              </div>
              <button class="btn" id="img-reset" style="font-size:12px"></button>
            </details>
            <div class="sub" id="img-estimate" style="margin:10px 0 0"></div>
            <button class="btn primary" id="img-generate" style="width:100%;margin-top:8px"></button>
            <button class="btn" id="img-folder" style="width:100%;margin-top:8px;font-size:12px"></button>
          </div>
        </div>
        <div class="img-main">
          <div class="img-gallery" id="img-gallery"></div>
        </div>
      </div>
    </section>

    <section id="sec-general" class="active">
      <div class="note" id="privacy-note"></div>
      <div class="row">
        <label class="head" id="l-hotkey"></label>
        <div class="inline">
          <input type="text" id="hotkey" class="hotkey-input" readonly />
        </div>
        <div class="sub" id="l-hotkey-hint"></div>
        <div class="err-text" id="hotkey-err"></div>
      </div>
      <div class="row">
        <label class="head" id="l-lang"></label>
        <div class="inline">
          <select id="lang">
            <option value="ru">Русский</option>
            <option value="en">English</option>
          </select>
        </div>
      </div>
      <div class="row">
        <label class="head" id="l-theme"></label>
        <div class="inline">
          <select id="theme">
            <option value="system"></option>
            <option value="light"></option>
            <option value="dark"></option>
          </select>
        </div>
      </div>
      <div class="row">
        <label class="check">
          <input type="checkbox" id="autostart" />
          <span id="l-autostart"></span>
        </label>
      </div>
      <div class="row">
        <label class="check">
          <input type="checkbox" id="autocopy" />
          <span id="l-autocopy"></span>
        </label>
        <div class="sub" id="l-autocopy-hint"></div>
      </div>
      <div class="row">
        <label class="head" id="l-myexamples"></label>
        <textarea id="myexamples" rows="4"></textarea>
        <div class="sub" id="l-myexamples-hint"></div>
      </div>
      <div class="row">
        <label class="head" id="l-username"></label>
        <div class="inline">
          <input type="text" id="username" style="max-width:240px" />
        </div>
        <div class="sub" id="l-username-hint"></div>
      </div>
      <div class="row">
        <label class="head" id="l-useraliases"></label>
        <div class="inline">
          <input type="text" id="useraliases" style="max-width:340px" />
        </div>
      </div>
      <div class="row">
        <label class="head" id="l-howto"></label>
        <ol class="howto">
          <li id="howto1"></li>
          <li id="howto2"></li>
          <li id="howto3"></li>
          <li id="howto4"></li>
        </ol>
      </div>
    </section>

    <section id="sec-styles">
      <h2 id="l-builtin"></h2>
      <div id="builtin-list"></div>
      <h2 id="l-custom" style="margin-top:24px"></h2>
      <div id="custom-list"></div>
      <div class="style-item" style="margin-top:14px">
        <div class="row">
          <label class="head" id="l-style-add"></label>
          <input type="text" id="new-style-name" />
        </div>
        <div class="row">
          <textarea id="new-style-prompt" rows="3"></textarea>
        </div>
        <button class="btn primary" id="btn-add-style"></button>
      </div>
    </section>

    <section id="sec-model">
      <div class="note ok" id="welcome-note" style="display:none"></div>
      <div class="note" id="hw-note" style="display:none"></div>
      <div class="engine" id="engine-status"></div>
      <div id="model-list"></div>
      <div class="style-item" style="margin-top:16px">
        <div style="font-weight:600" id="models-size"></div>
        <div class="sub muted" style="font-size:12px;margin-top:6px">
          <span id="l-models-dir"></span> <span id="models-dir" style="user-select:all"></span>
        </div>
        <button class="btn" id="btn-open-models" style="margin-top:10px"></button>
      </div>

      <h2 id="l-image-models" style="margin-top:30px"></h2>
      <div class="note" id="img-hw-note" style="display:none"></div>
      <div id="image-model-list"></div>
    </section>
  </main>
  <script src="i18n.js"></script>
  <script src="chat.js"></script>
  <script src="image.js"></script>
  <script src="settings.js"></script>
</body>
</html>
